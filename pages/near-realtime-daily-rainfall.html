  <style>
    /* Top header bar */
    .pbi-header {
      flex-shrink: 0; width: 100%; height: 64px; box-sizing: border-box;
      background: linear-gradient(90deg, #1a4a6e 0%, #0e2a42 100%);
      border-bottom: 2px solid #2d7ab0;
      display: flex; align-items: center; padding: 0 12px; gap: 8px;

      position: relative;
      z-index: 3000;
      isolation: isolate;
    }
    .pbi-header-back { color: #5da8ff; text-decoration: none; font-size: 18px; line-height: 1; flex-shrink: 0; }
    .pbi-header-title { font-size: 14px; font-weight: 700; color: #f1f5fb; white-space: nowrap; }

    /* Compact slicer in header */
    .hdr-slicer {
      display: flex; flex-direction: column; gap: 2px;
      padding: 4px 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(139,175,214,0.22);
      border-radius: 6px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .hdr-slicer.is-open {
      z-index: 2;
    }
    .hdr-slicer .sl-lbl { font-size: 9px; color: #6a8aaa; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
    .hdr-slicer-btn {
      width: 100%;
      border: none;
      border-radius: 4px;
      background: rgba(12,21,34,0.8);
      color: #f1f5fb;
      font-size: 11px;
      text-align: left;
      cursor: pointer;
      padding: 2px 18px 2px 4px;
      min-height: 20px;
      position: relative;
    }
    .hdr-slicer-btn::after {
      content: '▾';
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: #6a8aaa;
    }
    .hdr-slicer-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 100%;
      max-height: 240px;
      overflow: auto;
      display: none;
      z-index: 1200;
      background: rgba(13,23,37,0.98);
      border: 1px solid rgba(139,175,214,0.28);
      border-radius: 8px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
      padding: 4px;
    }
    .hdr-slicer.is-open .hdr-slicer-menu {
      display: block;
    }
    .hdr-slicer-item {
      display: flex;
      align-items: center;
      width: 100%;
      border: none;
      background: transparent;
      color: #d9e6f2;
      text-align: left;
      font-size: 11px;
      border-radius: 5px;
      padding: 5px 6px;
      cursor: pointer;
    }
    .hdr-slicer-item:hover {
      background: rgba(93,168,255,0.14);
      color: #f4f8fc;
    }
    .hdr-slicer-item.is-selected {
      background: rgba(93,168,255,0.2);
      color: #f4f8fc;
      font-weight: 700;
    }
    .hdr-slicer-item.is-all {
      border-bottom: 1px solid rgba(139,175,214,0.16);
      margin-bottom: 3px;
      padding-bottom: 6px;
    }
    .hdr-slicer-hint {
      font-size: 9px;
      color: #7f97b1;
      padding: 3px 6px 1px;
    }
    .hdr-slicer-item-label {
      display: block;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Two-panel content row */
    .main-row {
      display: flex; flex: 1; overflow: hidden; min-height: 0; width: 100%; max-width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Heatmap panel */
    .heatmap-panel {
      flex: 0 0 57%; height: 100%;
      background: linear-gradient(180deg,rgba(22,36,54,.97),rgba(16,28,44,.97));
      border-right: 1px solid rgba(139,175,214,0.18);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .heatmap-panel .hm-title {
      flex-shrink: 0;
      padding: 10px 12px 8px;
      font-size: 13px; font-weight: 800; color: #f1f5fb;
      background: rgba(30,50,80,0.76);
      border-bottom: 1px solid rgba(139,175,214,0.18);
      border-top: 1px solid rgba(139,175,214,0.18);
      letter-spacing: 0.01em;

    .heatmap-inner {
      flex: 1;
      overflow: auto;
      min-height: 0;

      scrollbar-color: rgba(106,138,170,0.9) rgba(18,30,48,0.25);

    .daily-grid {
      border-collapse: separate;

    .daily-grid th,
    .daily-grid td {

      padding: 4px 6px;
      text-align: center;
      border-right: 1px solid rgba(122,156,199,0.24);

    .daily-grid thead th {

    }
    .daily-grid tbody th {
      position: sticky;

      background: #135f7e;
      color: #eff7ff;
      font-weight: 800;
      min-width: 102px;
      text-align: left;
      padding-left: 10px;
    }
    .daily-grid td {

      font-weight: 700;
      background: #f6fafc;
      line-height: 1.1;
    }
    .daily-grid td.is-selected {
      box-shadow: inset 0 0 0 2px #ffffff, inset 0 0 0 3px rgba(19,95,126,0.42);
    }
    .daily-grid td.is-empty {
      background: #f8fbfe;
      color: rgba(22,38,56,0.18);
    }
    .heatmap-legend {
      display: flex;
      gap: 10px;
      padding: 7px 12px 9px;
      flex-wrap: wrap;
      align-items: center;
      background: #0f1e2e;
      color: #b4c0d0;
      position: sticky;
      bottom: 0;
      font-size: 11px;
      border-top: 1px solid rgba(139,175,214,0.14);
    }
    .heatmap-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .heatmap-legend-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;

    /* Map panel */
    .map-panel {
      flex: 1; height: 100%; position: relative;
      border-left: 1px solid rgba(139,175,214,0.18);
      background: #f3f5f8;
    }
    #leaflet-map {
      width: 100%; height: 100%;
    }

    .leaflet-container { background: #f3f5f8; }
    .leaflet-tile { opacity: 1 !important; }
    .leaflet-control-attribution { background: rgba(255,255,255,0.88) !important; color: #5f6d7a !important; }
    .leaflet-control-attribution a { color: #2669b2 !important; }
    .leaflet-control-zoom a { background: rgba(255,255,255,0.94) !important; color: #38516a !important; border-color: rgba(80,105,130,0.25) !important; }
    .leaflet-control-zoom a:hover { background: #ffffff !important; color: #1f3650 !important; }

    /* Custom map marker popup */
    .leaflet-popup-content-wrapper {
      background: rgba(16,28,44,0.96) !important;
      border: 1px solid rgba(139,175,214,0.3) !important;
      border-radius: 8px !important;

    .leaflet-popup-tip { background: rgba(16,28,44,0.96) !important; }

    .popup-gage { font-weight: 700; font-size: 13px; color: #5da8ff; }
    .popup-loc { color: #8aaccc; font-size: 11px; }
    .popup-rain { font-size: 14px; font-weight: 800; }
    .popup-cat { font-size: 10px; color: #8aaccc; }

    /* Pie chart DivIcon — strip Leaflet default wrapper, force pointer events through */
    .pie-marker { background: none !important; border: none !important; pointer-events: all !important; }
    .pie-marker svg { pointer-events: all; }
    .pie-marker svg path, .pie-marker svg circle[data-gage] { transition: opacity 0.1s; pointer-events: fill; }
    .pie-marker:hover svg path, .pie-marker:hover svg circle[data-gage] { opacity: 0.9; }

    /* Rain legend */
    .map-legend {
      position: absolute; top: 8px; left: 8px; right: 56px; z-index: 1000;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: rgba(255,255,255,0.9); border: 1px solid rgba(80,105,130,0.18);
      border-radius: 8px; padding: 6px 10px; font-size: 10px; color: #4d5d6e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      bottom: auto !important;
      width: max-content;
      max-width: calc(100% - 64px);
      pointer-events: none;
    }
    .map-legend-title { font-weight: 700; color: #42596d; margin-right: 2px; }
    .map-legend-row { display: inline-flex; align-items: center; gap: 4px; }
    .map-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .map-toolbar {
      position: absolute; top: 8px; right: 8px; z-index: 1001;
      display: flex; gap: 6px;
    }
    .map-tool-btn {
      border: 1px solid rgba(80,105,130,0.22);
      background: rgba(255,255,255,0.94);
      color: #31475d;
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .map-tool-btn.is-active {
      background: #1f5f99;
      color: #f4f8fc;
      border-color: rgba(31,95,153,0.6);
    }
    .map-tool-btn:hover {
      background: #ffffff;
      color: #20384f;
    }
    .map-tool-btn.is-active:hover {
      background: #184f7f;
      color: #f4f8fc;
    }
    .map-lasso-box {
      position: absolute;
      border: 2px dashed rgba(31,95,153,0.9);
      background: rgba(93,168,255,0.14);
      pointer-events: none;

    @media (max-width: 900px) {
      body {
        overflow-x: hidden !important;
        overflow-y: auto !important;

      .pbi-header {

      }
      .map-panel {

    @media (max-width: 560px) {
      .hdr-slicer {

  </style>

<body style="margin:0;overflow:hidden;display:flex;flex-direction:column;height:100vh;width:100vw;max-width:100vw;min-width:0;background:#0c1522;">

  <!-- Header with slicers -->
  <div class="pbi-header" id="hdr">
    <a class="pbi-header-back" href="../index.html" title="Back">&#8592;</a>
    <div class="pbi-header-title">Near-Realtime Daily Rainfall, Since 2002</div>

    <div class="hdr-slicer" style="width:148px;">
      <div class="sl-lbl">Raingage, HCFCD</div>
      <button type="button" class="hdr-slicer-btn" id="slGageBtn">All</button>
      <div class="hdr-slicer-menu" id="slGageMenu"></div>
    </div>

    <!-- Event Category -->
    <div class="hdr-slicer" style="width:138px;">
      <div class="sl-lbl">Event Category</div>
      <button type="button" class="hdr-slicer-btn" id="slCatBtn">All</button>
      <div class="hdr-slicer-menu" id="slCatMenu"></div>
    </div>

    <!-- Year-Mon -->
    <div class="hdr-slicer" style="width:114px;" id="slYMwrap">
      <div class="sl-lbl">Year-Mon</div>
      <button type="button" class="hdr-slicer-btn" id="slYMBtn">All</button>
      <div class="hdr-slicer-menu" id="slYMMenu"></div>
    </div>

    <!-- Sewer Basin -->
    <div class="hdr-slicer" style="width:118px;" id="slBasinWrap">
      <div class="sl-lbl">Sewer Basin</div>
      <button type="button" class="hdr-slicer-btn" id="slBasinBtn">All</button>
      <div class="hdr-slicer-menu" id="slBasinMenu"></div>
    </div>

    <!-- WWTP -->
    <div class="hdr-slicer" style="width:142px;" id="slWWTPwrap">
      <div class="sl-lbl">WWTP</div>
      <button type="button" class="hdr-slicer-btn" id="slWWTPBtn">69th Street</button>
      <div class="hdr-slicer-menu" id="slWWTPMenu"></div>
    </div>

    <div style="margin-left:auto;font-size:11px;color:#6a8aaa;white-space:nowrap;" id="hdrDate"></div>
  </div>

  <div class="main-row">

    <!-- Heatmap panel -->
    <div class="heatmap-panel">
      <div class="hm-title" id="hmTitle">Daily Rainfall by Gage — All Gages</div>
      <div class="heatmap-inner" id="heatmapInner"></div>
    </div>

    <!-- Map panel -->
    <div class="map-panel">
      <div id="leaflet-map"></div>
      <div class="map-legend" id="mapLegend"></div>
      <div class="map-toolbar" id="mapToolbar">
        <button type="button" class="map-tool-btn" id="btnResetZoom" title="Fit the map to the current filtered gages">Reset Zoom</button>
        <button type="button" class="map-tool-btn" id="btnLasso" title="Toggle lasso mode for multi-selecting gages">Lasso</button>
      </div>
    </div>

  </div>

<script>
Components.applyChartDefaults();

const rainfall = window.MOCK.Realtime_rainfall_hcfcd_daily;
const gages    = window.MOCK.RainGauge_HCFCD;
const meter    = window.MOCK.MeterBasin_RainGauge || [];

const gageMap  = {};
gages.forEach(g => { gageMap[g.Raingage] = g; });

// ── State ─────────────────────────────────────────────────────────
let selGages   = new Set();
let selCats    = new Set();
let selYMs     = new Set();
let selBasins  = new Set();
let selWWTPs   = new Set(['69th Street']);
let mapSelections = []; // [{ gage, category? }]
let mapPieEntries = new Map();
let mapMarkerCenters = new Map();
let mapMarkerLatLngs = new Map();
let mapLassoMode = false;
let mapLassoBoxEl = null;
let mapLassoDrag = null;
let suppressNextMapClear = false;
let mapViewSig = '';

// ── Category → colour (matching components.js) ────────────────────
// Colors match PBI conditional formatting exactly; Over 5.0 adapted for dark bg
const CAT_COLOR = {
  'Zero Rain':   '#1a2a3a',
  '<0.3 in':     '#fbe99c',
  '0.3-1.0 in':  '#6ed7f7',
  '1.0-3.0 in':  '#e77946',
  '3.0-5.0 in':  '#f5403b',
  'Over 5.0 in': '#b0001e',
};
const CAT_TEXT = {
  'Zero Rain':   '#4a6080',
  '<0.3 in':     '#1a1a00',
  '0.3-1.0 in':  '#003a4a',
  '1.0-3.0 in':  '#ffffff',
  '3.0-5.0 in':  '#ffffff',
  'Over 5.0 in': '#ffffff',
};

const slGageBtn = document.getElementById('slGageBtn');
const slGageMenu = document.getElementById('slGageMenu');
const slCatBtn = document.getElementById('slCatBtn');
const slCatMenu = document.getElementById('slCatMenu');
const slYMBtn = document.getElementById('slYMBtn');
const slYMMenu = document.getElementById('slYMMenu');
const slBasinBtn = document.getElementById('slBasinBtn');
const slBasinMenu = document.getElementById('slBasinMenu');
const slWWTPBtn = document.getElementById('slWWTPBtn');
const slWWTPMenu = document.getElementById('slWWTPMenu');
const btnResetZoom = document.getElementById('btnResetZoom');
const btnLasso = document.getElementById('btnLasso');
const allGages = [...new Set(rainfall.map(r => String(r.Gage)))].sort((a, b) => +a - +b);

const gagesByBasin = new Map();
const gagesByWWTP = new Map();

for (const row of meter) {
  if (row.METERBASIN) {
    if (!gagesByBasin.has(row.METERBASIN)) gagesByBasin.set(row.METERBASIN, new Set());
    gagesByBasin.get(row.METERBASIN).add(String(row.RAINGAGEID));
  }
  if (row.SERVICE_AR) {
    if (!gagesByWWTP.has(row.SERVICE_AR)) gagesByWWTP.set(row.SERVICE_AR, new Set());
    gagesByWWTP.get(row.SERVICE_AR).add(String(row.RAINGAGEID));
  }
}

function intersectSets(a, b) {
  return new Set([...a].filter(v => b.has(v)));
}

function unionMappedGages(selectedValues, lookupMap) {
  const merged = new Set();
  selectedValues.forEach(value => {
    const gagesForValue = lookupMap.get(value);
    if (!gagesForValue) return;
    gagesForValue.forEach(gage => merged.add(gage));
  });
  return merged;
}

function reconcileSet(currentSet, options) {
  const optionSet = new Set(options.map(String));
  return new Set([...currentSet].filter(value => optionSet.has(String(value))));
}

function summarizeSelection(selectedSet, { allLabel = 'All' } = {}) {
  if (!selectedSet.size) return allLabel;
  if (selectedSet.size === 1) return [...selectedSet][0];
  return `${selectedSet.size} selected`;
}

function allowedGages({ gages = selGages, basins = selBasins, wwtps = selWWTPs } = {}) {
  let allowed = new Set(allGages);
  if (gages.size) allowed = intersectSets(allowed, gages);
  if (basins.size) allowed = intersectSets(allowed, unionMappedGages(basins, gagesByBasin));
  if (wwtps.size) allowed = intersectSets(allowed, unionMappedGages(wwtps, gagesByWWTP));
  return allowed;
}

function selectionKey(sel) {
  return `${sel.gage}|${sel.category || '*'}`;
}

function hasMapSelections() {
  return mapSelections.length > 0;
}

function matchesMapSelection(row, sel) {
  return row.Gage === sel.gage && (!sel.category || row.Event_Category === sel.category);
}

function isSliceSelected(gageId, cat) {
  return mapSelections.some(sel => sel.gage === gageId && sel.category === cat);
}

function isGageSelected(gageId) {
  return mapSelections.some(sel => sel.gage === gageId);
}

function setMapSelections(nextSelections, { replace = true } = {}) {
  const merged = replace ? nextSelections : [...mapSelections, ...nextSelections];
  const unique = new Map();
  merged.forEach(sel => unique.set(selectionKey(sel), sel));
  mapSelections = [...unique.values()];
}

const slicers = {
  gage: { btn: slGageBtn, menu: slGageMenu, allLabel: 'All', summary: () => summarizeSelection(selGages) },
  cat: { btn: slCatBtn, menu: slCatMenu, allLabel: 'All', summary: () => summarizeSelection(selCats) },
  ym: { btn: slYMBtn, menu: slYMMenu, allLabel: 'All', summary: () => summarizeSelection(selYMs) },
  basin: { btn: slBasinBtn, menu: slBasinMenu, allLabel: 'All', summary: () => summarizeSelection(selBasins) },
  wwtp: { btn: slWWTPBtn, menu: slWWTPMenu, allLabel: 'All', summary: () => summarizeSelection(selWWTPs) },
};

let openSlicerKey = null;
const slicerOptions = { gage: [], cat: [], ym: [], basin: [], wwtp: [] };

// ── Filter data ───────────────────────────────────────────────────
function filterData({ skipGage = false, skipCat = false, skipYM = false, skipBasin = false, skipWWTP = false } = {}) {
  const gageSet = allowedGages({
    gages: skipGage ? new Set() : selGages,
    basins: skipBasin ? new Set() : selBasins,
    wwtps: skipWWTP ? new Set() : selWWTPs,
  });

  return rainfall.filter(r =>
    gageSet.has(String(r.Gage)) &&
    (skipCat || !selCats.size || selCats.has(String(r.Event_Category))) &&
    (skipYM || !selYMs.size || selYMs.has(String(r.Year_Mon)))
  );
}

function applyMapSelection(data) {
  if (!hasMapSelections()) return data;
  return data.filter(r => mapSelections.some(sel => matchesMapSelection(r, sel)));
}

function getSelectionSet(key) {
  if (key === 'gage') return selGages;
  if (key === 'cat') return selCats;
  if (key === 'ym') return selYMs;
  if (key === 'basin') return selBasins;
  return selWWTPs;
}

function setSelectionSet(key, nextSet) {
  if (key === 'gage') selGages = nextSet;
  else if (key === 'cat') selCats = nextSet;
  else if (key === 'ym') selYMs = nextSet;
  else if (key === 'basin') selBasins = nextSet;
  else selWWTPs = nextSet;
}

function updateSlicerButtonLabel(key) {
  slicers[key].btn.textContent = slicers[key].summary();
}

function renderSlicerMenu(key) {
  const menu = slicers[key].menu;
  const selectedSet = getSelectionSet(key);
  const options = slicerOptions[key];
  menu.innerHTML = '';

  const hint = document.createElement('div');
  hint.className = 'hdr-slicer-hint';
  hint.textContent = 'Ctrl/Cmd-click to multi-select';
  menu.appendChild(hint);

  const makeItem = (label, value, selected, extraClass = '') => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `hdr-slicer-item ${selected ? 'is-selected' : ''} ${extraClass}`.trim();
    btn.dataset.value = value;
    btn.innerHTML = `<span class="hdr-slicer-item-label">${label}</span>`;
    return btn;
  };

  menu.appendChild(makeItem(slicers[key].allLabel, '__all__', selectedSet.size === 0, 'is-all'));
  options.forEach(option => {
    menu.appendChild(makeItem(String(option), String(option), selectedSet.has(String(option))));
  });
  updateSlicerButtonLabel(key);
}

function closeOpenSlicer() {
  if (!openSlicerKey) return;
  slicers[openSlicerKey].btn.closest('.hdr-slicer').classList.remove('is-open');
  openSlicerKey = null;
}

function openSlicer(key) {
  if (openSlicerKey === key) {
    closeOpenSlicer();
    return;
  }
  closeOpenSlicer();
  slicers[key].btn.closest('.hdr-slicer').classList.add('is-open');
  openSlicerKey = key;
}

function syncSlicerOptions() {
  let changed = false;

  const gageOptions = [...new Set(filterData({ skipGage: true }).map(r => String(r.Gage)))].sort((a, b) => +a - +b);
  const nextGages = reconcileSet(selGages, gageOptions);
  if (nextGages.size !== selGages.size || [...nextGages].some(v => !selGages.has(v))) { selGages = nextGages; changed = true; }
  slicerOptions.gage = gageOptions;

  const catOptions = PIE_CATS.filter(cat => filterData({ skipCat: true }).some(r => r.Event_Category === cat)).map(String);
  const nextCats = reconcileSet(selCats, catOptions);
  if (nextCats.size !== selCats.size || [...nextCats].some(v => !selCats.has(v))) { selCats = nextCats; changed = true; }
  slicerOptions.cat = catOptions;

  const ymOptions = [...new Set(filterData({ skipYM: true }).map(r => String(r.Year_Mon)))].sort().reverse();
  const nextYMs = reconcileSet(selYMs, ymOptions);
  if (nextYMs.size !== selYMs.size || [...nextYMs].some(v => !selYMs.has(v))) { selYMs = nextYMs; changed = true; }
  slicerOptions.ym = ymOptions;

  const basinGages = new Set(filterData({ skipBasin: true }).map(r => String(r.Gage)));
  const basinOptions = [...new Set(
    meter
      .filter(row => basinGages.has(String(row.RAINGAGEID)))
      .filter(row => !selWWTPs.size || selWWTPs.has(row.SERVICE_AR))
      .map(row => String(row.METERBASIN))
      .filter(Boolean)
  )].sort();
  const nextBasins = reconcileSet(selBasins, basinOptions);
  if (nextBasins.size !== selBasins.size || [...nextBasins].some(v => !selBasins.has(v))) { selBasins = nextBasins; changed = true; }
  slicerOptions.basin = basinOptions;

  const wwtpGages = new Set(filterData({ skipWWTP: true }).map(r => String(r.Gage)));
  const wwtpOptions = [...new Set(
    meter
      .filter(row => wwtpGages.has(String(row.RAINGAGEID)))
      .filter(row => !selBasins.size || selBasins.has(row.METERBASIN))
      .map(row => String(row.SERVICE_AR))
      .filter(Boolean)
  )].sort();
  const nextWWTPs = reconcileSet(selWWTPs, wwtpOptions);
  if (nextWWTPs.size !== selWWTPs.size || [...nextWWTPs].some(v => !selWWTPs.has(v))) { selWWTPs = nextWWTPs; changed = true; }
  slicerOptions.wwtp = wwtpOptions;

  Object.keys(slicers).forEach(renderSlicerMenu);

  return changed;
}

function ensureConsistentState() {
  let safety = 0;
  while (syncSlicerOptions() && safety < 5) safety += 1;
}

// ── Render heatmap ────────────────────────────────────────────────
function renderHeatmap(data) {
  data = applyMapSelection(data);
  const inner = document.getElementById('heatmapInner');
  const gagesInData = new Set(data.map(r => r.Gage));
  const displayGages = gages
    .filter(g => gagesInData.has(g.Raingage))
    .map(g => g.Raingage)
    .sort((a, b) => a - b);

  // Title
  const titleEl = document.getElementById('hmTitle');
  if (mapSelections.length === 1 && mapSelections[0].category) {
    titleEl.textContent = `Daily Rainfall — Gage ${mapSelections[0].gage} | ${mapSelections[0].category}`;
  } else if (mapSelections.length === 1 && !mapSelections[0].category) {
    titleEl.textContent = `Daily Rainfall — Gage ${mapSelections[0].gage}`;
  } else if (mapSelections.length > 1) {
    titleEl.textContent = `Daily Rainfall — ${mapSelections.length} Map Selections`;
  } else if (selGages.size === 1) {
    const selectedGage = [...selGages][0];
    titleEl.textContent = `Daily Rainfall — Gage ${selectedGage}: ${gageMap[selectedGage]?.LOCATION || ''}`;
  } else {
    const activeCount = displayGages.length;
    titleEl.textContent = `Daily Rainfall by Gage — ${activeCount === gages.length ? 'All Gages' : activeCount + ' Gages'}`;
  }

  // Build lookup
  const lookup = {};
  data.forEach(r => { lookup[r.Date + '|' + r.Gage] = r; });

  // Get sorted unique dates (most recent first, max 90)
  const allDates = [...new Set(data.map(r => r.Date))].sort((a,b) => b.localeCompare(a)).slice(0, 90);

  if (!allDates.length) {
    inner.innerHTML = '<div style="padding:20px;color:#6a8aaa;font-size:12px;">No data for selected filters.</div>';
    return;
  }

  let html = `
      <table class="daily-grid">
        <thead>
          <tr>
            <th class="corner">Date</th>
            ${displayGages.map(g => `<th>${g}</th>`).join('')}
          </tr>
        </thead>
        <tbody>`;

  for (const date of allDates) {
    html += `<tr>
      <th scope="row">${date}</th>`;
    for (const g of displayGages) {
      const row  = lookup[date + '|' + g];
      const rain = row ? row.rain : null;
      const cat  = row ? row.Event_Category : null;
      const bg   = cat ? (CAT_COLOR[cat] || '#f6fafc') : '#f8fbfe';
      const txt  = cat ? (CAT_TEXT[cat] || '#ffffff') : 'rgba(22,38,56,0.18)';
      const disp = rain !== null ? (rain === 0 ? '·' : rain.toFixed(2)) : '';
      const isSelected = mapSelections.some(sel => sel.gage === g && (!sel.category || sel.category === cat));
      const tip  = `${g}: ${cat || 'No data'} (${rain !== null ? rain + ' in' : 'N/A'})`;
      const classes = [
        isSelected ? 'is-selected' : '',
        rain === null ? 'is-empty' : '',
      ].filter(Boolean).join(' ');
      html += `<td class="${classes}" style="background:${bg};color:${txt};" title="${tip}">${disp}</td>`;
    }
    html += '</tr>';
  }

  html += `</tbody></table>
    <div class="heatmap-legend">
      ${Object.entries(CAT_COLOR).map(([c, col]) => `<span class="heatmap-legend-item">
        <span class="heatmap-legend-swatch" style="background:${col};"></span>${c}
      </span>`).join('')}
    </div>`;

  inner.innerHTML = html;
}

// ── Leaflet map ───────────────────────────────────────────────────
const map = L.map('leaflet-map', {
  center: [29.76, -95.37],
  zoom: 10,
  zoomControl: true,
  attributionControl: true,
  fadeAnimation: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 18,
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);

// Category index array — avoids HTML-encoding issues in SVG data-* attributes
const PIE_CATS = ['Zero Rain', '<0.3 in', '0.3-1.0 in', '1.0-3.0 in', '3.0-5.0 in', 'Over 5.0 in'];

function pieGeometry(visibleCount) {
  if (hasMapSelections() || visibleCount <= 6) {
    return { radius: 28, labelH: 18, labelFont: 11, labelCharW: 8, labelMinW: 40 };
  }
  if (selGages.size || selCats.size || selYMs.size || selBasins.size || selWWTPs.size || visibleCount <= 14) {
    return { radius: 24, labelH: 17, labelFont: 10, labelCharW: 7.5, labelMinW: 36 };
  }
  if (visibleCount <= 24) {
    return { radius: 21, labelH: 16, labelFont: 9.5, labelCharW: 7, labelMinW: 33 };
  }
  return { radius: 18, labelH: 14, labelFont: 8.5, labelCharW: 7, labelMinW: 30 };
}

// Zero Rain is near-black on dark tile — use visible grey for the map pie specifically
function pieColor(cat) {
  return cat === 'Zero Rain' ? '#4a5568' : (CAT_COLOR[cat] || '#4a5568');
}

function makePieSVG(gageId, counts, geom) {
  const { radius, labelH, labelFont, labelCharW, labelMinW } = geom;
  const cx   = radius + 1;
  const cy   = labelH + radius + 1;
  const svgW = (radius + 1) * 2;
  const svgH = labelH + svgW;
  const gageSelected = isGageSelected(gageId);
  const svgOpacity = hasMapSelections() && !gageSelected ? 0.42 : 1;

  const nonZero = PIE_CATS.filter(c => counts[c] > 0);
  if (!nonZero.length) return '';

  let paths = '';

  if (nonZero.length === 1) {
    // Single category → solid circle
    const cat = nonZero[0];
    const stroke = isSliceSelected(gageId, cat) ? '#ffffff' : 'rgba(0,0,0,0.22)';
    const width = isSliceSelected(gageId, cat) ? '2.5' : '0.8';
    paths += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="${pieColor(cat)}" stroke="${stroke}" stroke-width="${width}" data-gage="${gageId}" data-cat="${cat}" style="cursor:pointer;"/>`;
  } else {
    let angle   = -Math.PI / 2;
    PIE_CATS.forEach(cat => {
      if (!counts[cat]) return;
      const sweep = (2 * Math.PI) / nonZero.length;
      const x1 = cx + radius * Math.cos(angle);
      const y1 = cy + radius * Math.sin(angle);
      const end = angle + sweep;
      const x2  = cx + radius * Math.cos(end);
      const y2  = cy + radius * Math.sin(end);
      const lg  = sweep > Math.PI ? 1 : 0;
      const selected = isSliceSelected(gageId, cat);
      paths += `<path d="M${cx},${cy}L${x1.toFixed(2)},${y1.toFixed(2)}A${radius},${radius} 0 ${lg},1 ${x2.toFixed(2)},${y2.toFixed(2)}Z" fill="${pieColor(cat)}" stroke="${selected ? '#ffffff' : 'rgba(0,0,0,0.22)'}" stroke-width="${selected ? '2.5' : '0.8'}" data-gage="${gageId}" data-cat="${cat}" style="cursor:pointer;"/>`;
      angle = end;
    });
  }

  const ringStroke = gageSelected ? '#ffffff' : 'rgba(255,255,255,0.45)';
  const ringWidth = gageSelected ? '2.6' : '1';
  paths += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${ringStroke}" stroke-width="${ringWidth}" pointer-events="none"/>`;

  const label = String(gageId);
  const labelW = Math.max(labelMinW, 12 + label.length * labelCharW);
  const labelX = cx - labelW / 2;
  paths += `<rect x="${labelX}" y="0.5" rx="5" ry="5" width="${labelW}" height="${labelH - 1}" fill="#45a56a" stroke="rgba(255,255,255,0.55)" stroke-width="0.6" pointer-events="none"/>`;
  paths += `<text x="${cx}" y="${Math.max(10, labelH * 0.7)}" text-anchor="middle" font-size="${labelFont}" font-weight="700" fill="#f1f5fb" font-family="Arial,sans-serif" pointer-events="none">${gageId}</text>`;

  return `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg" data-gage-root="${gageId}" data-pie-r="${radius}" data-label-h="${labelH}" pointer-events="all" style="overflow:visible;opacity:${svgOpacity};">${paths}</svg>`;
}

// Floating tooltip matching PBI style
let _pieTip = null;
function showPieTip(e, gageId, cat, lat, lon) {
  if (!_pieTip) {
    _pieTip = document.createElement('div');
    _pieTip.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;background:rgba(16,28,44,0.96);border:1px solid rgba(139,175,214,0.3);border-radius:8px;padding:8px 12px;font-size:11px;color:#f1f5fb;box-shadow:0 4px 18px rgba(0,0,0,0.5);line-height:1.8;white-space:nowrap;';
    document.body.appendChild(_pieTip);
  }
  _pieTip.innerHTML =
    `<div style="font-weight:700;color:#5da8ff;font-size:13px;margin-bottom:2px;">Gage ${gageId}</div>` +
    `<div><span style="color:#8aaccc;">Event Category</span> &nbsp;<b>${cat}</b></div>` +
    `<div><span style="color:#8aaccc;">Average of LATITUDE</span> &nbsp;${lat.toFixed(4)}</div>` +
    `<div><span style="color:#8aaccc;">Average of LONGITUDE</span> &nbsp;${lon.toFixed(4)}</div>`;
  _pieTip.style.left = (e.clientX + 14) + 'px';
  _pieTip.style.top  = (e.clientY - 10) + 'px';
  _pieTip.style.display = 'block';
}
function hidePieTip() { if (_pieTip) _pieTip.style.display = 'none'; }

function sliceFromPointerEvent(el, entries, ev) {
  if (!el || !ev) return null;
  const svgEl = el.matches?.('svg[data-gage-root]') ? el : el.querySelector?.('svg[data-gage-root]');
  const radius = Number(svgEl?.getAttribute('data-pie-r')) || 18;
  const labelH = Number(svgEl?.getAttribute('data-label-h')) || 14;
  const rect = el.getBoundingClientRect();
  const dx = ev.clientX - (rect.left + radius + 1);
  const dy = ev.clientY - (rect.top  + labelH + radius + 1);
  if (Math.sqrt(dx * dx + dy * dy) > radius + 2) return null;
  if (!entries.length) return null;
  if (entries.length === 1) return entries[0].cat;
  const angle = Math.atan2(dy, dx);
  const norm  = ((angle + Math.PI / 2) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let acc = 0;
  for (const entry of entries) {
    acc += 1 / entries.length;
    if (norm / (2 * Math.PI) <= acc) return entry.cat;
  }
  return entries[entries.length - 1].cat;
}

function updateDebugState() {
  window.__rainwiseDailyState = {
    selGages: [...selGages],
    selCats: [...selCats],
    selYMs: [...selYMs],
    selBasins: [...selBasins],
    selWWTPs: [...selWWTPs],
    mapSelections,
    mapLassoMode,
  };
}

function handleMapSliceSelection(gageId, cat, { append = false } = {}) {
  if (!cat) return;
  const next = { gage: gageId, category: cat };
  const exists = mapSelections.some(sel => selectionKey(sel) === selectionKey(next));
  if (append) {
    mapSelections = exists
      ? mapSelections.filter(sel => selectionKey(sel) !== selectionKey(next))
      : [...mapSelections, next];
  } else {
    mapSelections = exists && mapSelections.length === 1 ? [] : [next];
  }
  render();
}

function handleMapGageSelection(gageIds, { append = false } = {}) {
  const nextSelections = gageIds.map(gageId => ({ gage: gageId }));
  if (!append) {
    mapSelections = nextSelections;
    render();
    return;
  }
  const toggled = new Map(mapSelections.map(sel => [selectionKey(sel), sel]));
  nextSelections.forEach(sel => {
    const key = selectionKey(sel);
    if (toggled.has(key)) toggled.delete(key);
    else toggled.set(key, sel);
  });
  mapSelections = [...toggled.values()];
  render();
}

function setLassoMode(active) {
  mapLassoMode = active;
  btnLasso.classList.toggle('is-active', active);
  const container = map.getContainer();
  container.style.cursor = active ? 'crosshair' : '';
  if (active) map.dragging.disable();
  else map.dragging.enable();
}

function removeLassoBox() {
  if (mapLassoBoxEl) mapLassoBoxEl.remove();
  mapLassoBoxEl = null;
}

function markerBoundsForSelections(selections = mapSelections) {
  const pts = selections
    .map(sel => mapMarkerLatLngs.get(sel.gage))
    .filter(Boolean);
  if (!pts.length) return null;
  return L.latLngBounds(pts);
}

function fitMapToSelections({ force = false } = {}) {
  const bounds = markerBoundsForSelections();
  if (!bounds || !bounds.isValid()) return false;
  const hasSingle = bounds.getNorth() === bounds.getSouth() && bounds.getEast() === bounds.getWest();
  if (hasSingle) {
    map.setView(bounds.getCenter(), force ? 12 : Math.max(map.getZoom(), 12));
  } else {
    map.fitBounds(bounds.pad(0.18), { maxZoom: 12, padding: [18, 18] });
  }
  return true;
}

function fitMapToFilteredGages(force = false) {
  const pts = [...mapMarkerLatLngs.values()];
  if (!pts.length) {
    map.setView([29.76, -95.37], 10);
    return;
  }
  const bounds = L.latLngBounds(pts);
  if (!bounds.isValid()) return;
  const hasSingle = bounds.getNorth() === bounds.getSouth() && bounds.getEast() === bounds.getWest();
  if (hasSingle) {
    map.setView(bounds.getCenter(), force ? 12 : Math.max(map.getZoom(), 11));
  } else {
    map.fitBounds(bounds.pad(0.14), { maxZoom: 11, padding: [28, 28] });
  }
}

function refreshMarkerCenters() {
  mapMarkerCenters = new Map(
    [...mapMarkerLatLngs.entries()].map(([gageId, latLng]) => [gageId, map.latLngToContainerPoint(latLng)])
  );
}

function markerContextFromEvent(ev) {
  const target = ev?.target;
  if (!(target instanceof Element)) return null;
  const markerEl = target.closest('.pie-marker');
  const svgEl = target.closest('svg[data-gage-root]');
  if (!markerEl || !svgEl) return null;
  const gageId = Number(svgEl.getAttribute('data-gage-root'));
  return {
    entries: mapPieEntries.get(gageId) || [],
    gageId,
    markerEl,
  };
}

function renderMap(data) {
  markerLayer.clearLayers();
  mapPieEntries = new Map();
  mapMarkerCenters = new Map();
  mapMarkerLatLngs = new Map();

  // Per-gage: category counts in current slicer-filtered data
  const gageCounts = {};
  data.forEach(r => {
    if (!gageCounts[r.Gage]) gageCounts[r.Gage] = {};
    gageCounts[r.Gage][r.Event_Category] = (gageCounts[r.Gage][r.Event_Category] || 0) + 1;
  });

  const visibleGages = gages.filter(g => {
    if (!g.LATITUDE || !g.LONGITUDE) return false;
    if (selGages.size && !selGages.has(String(g.Raingage))) return false;
    return Boolean(gageCounts[g.Raingage]);
  });
  const geom = pieGeometry(visibleGages.length);

  visibleGages.forEach(g => {
    const counts = gageCounts[g.Raingage];
    const entries = PIE_CATS.filter(c => counts[c] > 0).map(cat => ({ cat, count: counts[cat] }));
    mapPieEntries.set(g.Raingage, entries);
    mapMarkerLatLngs.set(g.Raingage, L.latLng(g.LATITUDE, g.LONGITUDE));

    const icon = L.divIcon({
      html:       makePieSVG(g.Raingage, counts, geom),
      className:  'pie-marker',
      iconSize:   [(geom.radius + 1) * 2, geom.labelH + (geom.radius + 1) * 2],
      iconAnchor: [geom.radius + 1, geom.labelH + geom.radius + 1],
    });

    const marker = L.marker([g.LATITUDE, g.LONGITUDE], { icon });
    marker.addTo(markerLayer);
  });

  // Legend
  document.getElementById('mapLegend').innerHTML =
    `<span class="map-legend-title">Event Category</span>` +
    PIE_CATS.map(c => `<div class="map-legend-row"><span class="map-legend-dot" style="background:${pieColor(c)};"></span>${c}</div>`).join('');
}

// Click on map background clears any persistent gage selection
map.on('click', function () {
  if (suppressNextMapClear) {
    suppressNextMapClear = false;
    return;
  }
  if (hasMapSelections()) {
    mapSelections = [];
    render();
  }
});

const markerPaneEl = map.getPanes().markerPane;
markerPaneEl.addEventListener('mousemove', function (ev) {
  const ctx = markerContextFromEvent(ev);
  if (!ctx) return hidePieTip();
  const cat = sliceFromPointerEvent(ctx.markerEl, ctx.entries, ev);
  const gage = gageMap[ctx.gageId];
  if (!cat || !gage) return hidePieTip();
  showPieTip(ev, ctx.gageId, cat, gage.LATITUDE, gage.LONGITUDE);
}, true);

markerPaneEl.addEventListener('mouseleave', function () {
  hidePieTip();
}, true);

markerPaneEl.addEventListener('click', function (ev) {
  const ctx = markerContextFromEvent(ev);
  if (!ctx) return;
  if (mapLassoMode) return;
  ev.stopPropagation();
  ev.preventDefault();
  suppressNextMapClear = true;
  handleMapSliceSelection(ctx.gageId, sliceFromPointerEvent(ctx.markerEl, ctx.entries, ev), {
    append: !!(ev.metaKey || ev.ctrlKey || ev.shiftKey),
  });
}, true);

map.getContainer().addEventListener('mousedown', function (ev) {
  if (!mapLassoMode || ev.button !== 0) return;
  const rect = map.getContainer().getBoundingClientRect();
  mapLassoDrag = {
    append: !!(ev.metaKey || ev.ctrlKey || ev.shiftKey),
    startX: ev.clientX - rect.left,
    startY: ev.clientY - rect.top,
  };
  mapLassoBoxEl = document.createElement('div');
  mapLassoBoxEl.className = 'map-lasso-box';
  map.getContainer().appendChild(mapLassoBoxEl);
  ev.preventDefault();
});

window.addEventListener('mousemove', function (ev) {
  if (!mapLassoDrag || !mapLassoBoxEl) return;
  const rect = map.getContainer().getBoundingClientRect();
  const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
  const y = Math.max(0, Math.min(rect.height, ev.clientY - rect.top));
  const left = Math.min(mapLassoDrag.startX, x);
  const top = Math.min(mapLassoDrag.startY, y);
  const width = Math.abs(mapLassoDrag.startX - x);
  const height = Math.abs(mapLassoDrag.startY - y);
  mapLassoBoxEl.style.left = `${left}px`;
  mapLassoBoxEl.style.top = `${top}px`;
  mapLassoBoxEl.style.width = `${width}px`;
  mapLassoBoxEl.style.height = `${height}px`;
});

window.addEventListener('mouseup', function (ev) {
  if (!mapLassoDrag) return;
  const rect = map.getContainer().getBoundingClientRect();
  const endX = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
  const endY = Math.max(0, Math.min(rect.height, ev.clientY - rect.top));
  const left = Math.min(mapLassoDrag.startX, endX);
  const right = Math.max(mapLassoDrag.startX, endX);
  const top = Math.min(mapLassoDrag.startY, endY);
  const bottom = Math.max(mapLassoDrag.startY, endY);
  const isClickish = Math.abs(mapLassoDrag.startX - endX) < 6 && Math.abs(mapLassoDrag.startY - endY) < 6;
  const selectedGages = isClickish ? [] : [...mapMarkerCenters.entries()]
    .filter(([, point]) => point.x >= left && point.x <= right && point.y >= top && point.y <= bottom)
    .map(([gageId]) => gageId);
  const append = mapLassoDrag.append;
  mapLassoDrag = null;
  removeLassoBox();
  if (selectedGages.length) {
    suppressNextMapClear = true;
    handleMapGageSelection(selectedGages, { append });
    fitMapToSelections({ force: true });
  }
});

// ── Main render ───────────────────────────────────────────────────
function render() {
  ensureConsistentState();
  const d = filterData();
  if (hasMapSelections()) {
    mapSelections = mapSelections.filter(sel => d.some(r => matchesMapSelection(r, sel)));
  }
  updateDebugState();
  renderHeatmap(d);
  renderMap(d);
  const nextViewSig = JSON.stringify({
    gages: [...mapMarkerLatLngs.keys()].sort((a, b) => a - b),
    selections: mapSelections.map(selectionKey).sort(),
  });
  if (nextViewSig !== mapViewSig) {
    if (hasMapSelections()) fitMapToSelections({ force: true });
    else fitMapToFilteredGages(true);
    mapViewSig = nextViewSig;
  }
  refreshMarkerCenters();
}

// ── Slicer event listeners ─────────────────────────────────────────
Object.entries(slicers).forEach(([key, slicer]) => {
  slicer.btn.addEventListener('click', function (ev) {
    ev.stopPropagation();
    openSlicer(key);
  });

  slicer.menu.addEventListener('click', function (ev) {
    const item = ev.target.closest('.hdr-slicer-item');
    if (!item) return;
    ev.stopPropagation();
    const value = item.dataset.value;
    const append = !!(ev.ctrlKey || ev.metaKey);
    let nextSet = new Set(getSelectionSet(key));

    if (value === '__all__') {
      nextSet = new Set();
    } else if (append) {
      if (nextSet.has(value)) nextSet.delete(value);
      else nextSet.add(value);
    } else {
      nextSet = new Set([value]);
    }

    setSelectionSet(key, nextSet);
    mapSelections = [];
    ensureConsistentState();
    render();

    if (!append) closeOpenSlicer();
  });
});

document.addEventListener('click', function () {
  closeOpenSlicer();
});

btnResetZoom.addEventListener('click', function () {
  mapViewSig = '';
  if (hasMapSelections()) fitMapToSelections({ force: true });
  else fitMapToFilteredGages(true);
});
btnLasso.addEventListener('click', function () {
  const nextActive = !mapLassoMode;
  setLassoMode(nextActive);
  if (!nextActive) {
    mapLassoDrag = null;
    removeLassoBox();
  }
});

window.__rainwiseMapApi = {
  clearSelections() {
    mapSelections = [];
    render();
  },
  fitFiltered() {
    fitMapToFilteredGages(true);
  },
  fitSelections() {
    fitMapToSelections({ force: true });
  },
  setSelections(selections) {
    mapSelections = selections;
    render();
  },
  setLassoMode(active) {
    setLassoMode(!!active);
  },
};

// ── Header date ───────────────────────────────────────────────────
document.getElementById('hdrDate').textContent = 'Last Update: ' + (window.MOCK.Refresh_DateTime?.Date || '—');

// ── Initial render ────────────────────────────────────────────────
render();

// Invalidate map after initial layout
setTimeout(() => { map.invalidateSize(); }, 100);

// Re-invalidate map whenever the window is resized
window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 150));
map.on('moveend zoomend', refreshMarkerCenters);
</script>
</body>
</html>
